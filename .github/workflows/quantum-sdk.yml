name: Intel Quantum SDK

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
    paths:
    - images/quantum/**
  pull_request:
    branches: [ "main" ]

env:
  DOCKER_BUILDKIT: '1'
  DOCKERFILE_PATH: images/quantum/Dockerfile
  DOCKERHUB_REPOSTIORY: stevenfollis
  DOCKERHUB_IMAGE: oneapi
  DOCKERHUB_TAG: 'quantum-sdk'

jobs:
  
  build:
    runs-on: self-hosted
    steps:
    - uses: actions/checkout@v4
    - name: Build the Docker image
      run: |
        docker build \
          --file ${DOCKERFILE_PATH} \
          --tag ${DOCKERHUB_REPOSTIORY}/${DOCKERHUB_IMAGE}:${DOCKERHUB_TAG}-${GITHUB_SHA::7} \
          .

  push:
    runs-on: self-hosted
    needs: build
    steps:
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
    - name: Push the Docker image
      run: docker push ${DOCKERHUB_REPOSTIORY}/${DOCKERHUB_IMAGE}:${DOCKERHUB_TAG}-${GITHUB_SHA::7}

  clean:
    runs-on: self-hosted
    if: ${{ always() }}
    needs: [build, push]
    steps:
    - name: Prune the runner
      run: docker system prune --all --force

