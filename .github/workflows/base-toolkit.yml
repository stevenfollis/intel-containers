name: oneAPI Base Toolkit

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
    paths:
      - oneapi/base-toolkit/**
  pull_request:
    branches: [ "main" ]

jobs:
  
  build:

    runs-on: self-hosted
    
    env:
      DOCKERHUB_REPOSTIORY: stevenfollis
      DOCKERHUB_IMAGE: oneapi
      DOCKERHUB_TAG: 'base-toolkit'

    - uses: actions/checkout@v4

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build the Docker image
      run: |
        docker build \
          --file oneapi/base-toolkit/Dockerfile \
          --tag ${DOCKERHUB_REPOSTIORY}/${DOCKERHUB_IMAGE}:${DOCKERHUB_TAG}-${GITHUB_SHA::7} \
          .

    - name: Push the Docker image
      run: docker push ${DOCKERHUB_REPOSTIORY}/${DOCKERHUB_IMAGE}:${DOCKERHUB_TAG}-${GITHUB_SHA::7}    

