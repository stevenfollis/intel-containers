name: oneAPI Base Toolkit

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
    paths:
      - oneapi/base-toolkit/**
  pull_request:
    branches: [ "main" ]

jobs:
  
  build:

    #runs-on: ubuntu-latest
    runs-on: self-hosted
    
    env:
      DOCKERHUB_REPOSTIORY: stevenfollis
      DOCKERHUB_IMAGE: oneapi
      DOCKERHUB_TAG: 'base-toolkit'

    steps:
    - name: 'Cleanup build folder'
      run: |
        ls -la ./
        rm -rf ./* || true
        rm -rf ./.??* || true
        ls -la ./
    
    - uses: actions/checkout@v4

    - name: Generate short SHA
      run: echo "SHA_SHORT=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build the Docker image
      run: docker build --file oneapi/base-toolkit/Dockerfile --tag ${DOCKERHUB_REPOSTIORY}/${DOCKERHUB_IMAGE}:${DOCKERHUB_TAG}-${SHA_SHORT} .

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@0.24.0
      with:
        image-ref: ${DOCKERHUB_REPOSTIORY}/${DOCKERHUB_IMAGE}:${DOCKERHUB_TAG}-${SHA_SHORT}
        format: table
        exit-code: '1'
        ignore-unfixed: true
        vuln-type: os,library
        severity: CRITICAL,HIGH

    - name: Push the Docker image
      run: docker push ${DOCKERHUB_REPOSTIORY}/${DOCKERHUB_IMAGE}:${DOCKERHUB_TAG}-${SHA_SHORT}

