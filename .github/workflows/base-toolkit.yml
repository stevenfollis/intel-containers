name: oneAPI Base Toolkit

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
    paths:
      - oneapi/base-toolkit/**
  pull_request:
    branches: [ "main" ]

env:
  DOCKERHUB_REPOSTIORY: stevenfollis

jobs:
  
  build:

    #runs-on: ubuntu-latest
    runs-on: self-hosted
    
    steps:
    - uses: actions/checkout@v4

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build the Docker image
      run: docker build . --file oneapi/base-toolkit/Dockerfile --tag ${DOCKERHUB_REPOSTIORY}/oneapi:base-toolkit-${GITHUB_SHA::7}

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@0.24.0
      with:
        image-ref: ${DOCKERHUB_REPOSTIORY}/oneapi:base-toolkit-${GITHUB_SHA::7}
        format: table
        exit-code: '1'
        ignore-unfixed: true
        vuln-type: os,library
        severity: CRITICAL,HIGH

    - name: Push the Docker image
      run: docker push ${DOCKERHUB_REPOSTIORY}/oneapi:base-toolkit-${GITHUB_SHA::7}

